<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura | Elite Management v6</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root { --primary: #1a0f0a; --accent: #bc6c25; --danger: #dc3545; --success: #28a745; --empty: #6c757d; --bg: #f8f5f2; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); margin: 0; padding: 20px 20px 120px 20px; color: #333; }
        
        .admin-container { display: grid; grid-template-columns: 1fr 400px; gap: 30px; max-width: 1600px; margin: 0 auto; }
        @media (max-width: 1100px) { .admin-container { grid-template-columns: 1fr; } }

        .masa-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .masa-kutu { height: 120px; border-radius: 15px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; transition: 0.3s; color: white; font-weight: bold; border: 4px solid transparent; }
        .masa-kutu.aktif { border-color: var(--accent); transform: scale(1.05); }
        .masa-kutu.bos { background: var(--empty); opacity: 0.6; }
        .masa-kutu.bekliyor { background: var(--danger); animation: pulse 2s infinite; }
        .masa-kutu.teslim { background: var(--success); }

        .detay-paneli { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); position: sticky; top: 20px; min-height: 500px; }
        
        .siparis-item { padding: 12px; border-radius: 12px; background: #fff; border: 1px solid #eee; margin-bottom: 8px; border-left: 6px solid var(--danger); }
        .siparis-item.teslim-edildi { border-left: 6px solid var(--success); background: #f8fff9; }
        
        .btn-teslim { background: var(--success); color: white; border: none; padding: 5px 12px; border-radius: 15px; cursor: pointer; font-size: 0.7rem; font-weight: 700; }
        .btn-teslim.hazir { opacity: 0.4; pointer-events: none; }

        .odeme-paneli { background: #f8f9fa; padding: 15px; border-radius: 15px; margin-top: 15px; border: 1px solid #ddd; }
        .odeme-input { width: 100%; padding: 12px; margin-bottom: 10px; border: 2px solid #ccc; border-radius: 10px; text-align: center; font-size: 1.1rem; box-sizing: border-box; }
        
        .alt-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: var(--primary); padding: 15px 0; display: flex; justify-content: center; gap: 15px; z-index: 1000; }
        .btn-alt { background: var(--accent); color: white; border: none; padding: 10px 20px; border-radius: 25px; font-weight: bold; cursor: pointer; }
        
        .modal { display:none; position:fixed; top:50%; left:50%; transform:translate(-50%, -50%); background:white; padding:25px; border-radius:20px; box-shadow:0 0 50px rgba(0,0,0,0.5); z-index:2000; width:90%; max-width:400px; }
        .overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index:1500; }

        .btn-fullscreen { position: fixed; bottom: 80px; right: 20px; width: 45px; height: 45px; border-radius: 50%; background: var(--primary); color: white; border: none; cursor: pointer; z-index: 999; display: flex; align-items: center; justify-content: center; opacity: 0.7; }

        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.03); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

    <button class="btn-fullscreen" onclick="tamEkranToggle()"><i class="fas fa-expand"></i></button>

    <div class="admin-container">
        <div class="masa-grid" id="masa-container"></div>
        <div class="detay-paneli">
            <h3 id="secili-masa-no" style="margin:0 0 15px 0; font-size: 1.2rem;">Masa Seçin</h3>
            <div id="masa-siparisleri" style="max-height: 300px; overflow-y: auto;"></div>
            
            <div id="islem-alani" style="display: none;">
                <div style="display: flex; justify-content: space-between; font-weight: 700; font-size: 1.3rem; margin: 15px 0; padding: 10px; background: #fff5f5; border-radius: 10px;">
                    <span>KALAN:</span> <span id="masa-toplam" style="color:var(--danger)">0 TL</span>
                </div>
                
                <div class="odeme-paneli">
                    <input type="number" id="odeme-tutar" class="odeme-input" placeholder="Tutar Gir">
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px;">
                        <button onclick="hizliOdeme('Nakit')" style="background:var(--success); color:white; border:none; padding:10px; border-radius:8px; font-weight:600; cursor:pointer;">NAKİT</button>
                        <button onclick="hizliOdeme('Kart')" style="background:#007bff; color:white; border:none; padding:10px; border-radius:8px; font-weight:600; cursor:pointer;">KART</button>
                    </div>
                    <button onclick="masayiKapat()" style="width:100%; margin-top:8px; background:var(--primary); color:white; border:none; padding:10px; border-radius:8px; cursor:pointer; font-size: 0.8rem;">MASAYI TEMİZLE</button>
                </div>

                <div style="margin-top: 15px; display: flex; gap: 5px;">
                    <select id="yeni-masa-no" style="flex:1; padding:5px; border-radius:5px; border:1px solid #ddd;"></select>
                    <button onclick="masaTasi()" style="padding:5px 10px; border-radius:5px; background:#eee; font-size: 0.8rem; cursor:pointer;">Taşı</button>
                </div>
            </div>
        </div>
    </div>

    <div class="alt-bar">
        <button class="btn-alt" onclick="raporGoster()">ÖZET</button>
        <button class="btn-alt" style="background:#495057" onclick="arsivListele()">ARŞİV</button>
    </div>

    <div class="overlay" id="overlay" onclick="modalKapat()"></div>
    <div class="modal" id="modal">
        <h3 id="modal-baslik"></h3>
        <div id="modal-icerik"></div>
        <button onclick="modalKapat()" style="width:100%; padding:10px; margin-top:10px;">Kapat</button>
        <button id="gunu-kapat-btn" onclick="gunuKapat()" style="width:100%; padding:10px; margin-top:5px; background:var(--danger); color:white; border:none; font-weight:bold; display:none;">GÜNÜ KAPAT</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAO2RemuvkZuYHUoKqYCkxLGpkhZNXdcKQ",
            authDomain: "aurasiparis-27cef.firebaseapp.com",
            databaseURL: "https://aurasiparis-27cef-default-rtdb.firebaseio.com",
            projectId: "aurasiparis-27cef",
            storageBucket: "aurasiparis-27cef.firebasestorage.app",
            messagingSenderId: "90780214645",
            appId: "1:90780214645:web:601547318ff44ea9869f3c"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let aktifMasa = null;
        let tumSiparisler = [];

        const sel = document.getElementById('yeni-masa-no');
        for(let i=1; i<=20; i++) sel.innerHTML += `<option value="${i}">Masa ${i}</option>`;

        function tamEkranToggle() {
            if (!document.fullscreenElement) document.documentElement.requestFullscreen();
            else if (document.exitFullscreen) document.exitFullscreen();
        }

        db.ref('siparisler').on('value', snap => {
            tumSiparisler = [];
            snap.forEach(c => { if(c.val().durum !== "Odendi") tumSiparisler.push({id:c.key, ...c.val()}); });
            ekraniGuncelle();
        });

        function ekraniGuncelle() {
            const container = document.getElementById('masa-container');
            container.innerHTML = "";
            for(let i=1; i<=20; i++) {
                const mSips = tumSiparisler.filter(s => String(s.masa) === String(i));
                let durum = mSips.length > 0 ? (mSips.some(s => s.durum === "Yeni") ? "bekliyor" : "teslim") : "bos";
                container.innerHTML += `<div class="masa-kutu ${durum} ${aktifMasa==i?'aktif':''}" onclick="masaSec(${i})">Masa ${i}</div>`;
            }

            if(aktifMasa) {
                const mSips = tumSiparisler.filter(s => String(s.masa) === String(aktifMasa));
                const liste = document.getElementById('masa-siparisleri');
                document.getElementById('secili-masa-no').innerText = "Masa " + aktifMasa;
                document.getElementById('islem-alani').style.display = mSips.length > 0 ? "block" : "none";
                
                let toplam = 0;
                let gruplanmis = {};

                // Gruplama Mantığı
                mSips.forEach(s => {
                    toplam += Number(s.fiyat);
                    if(s.tip !== "odeme") {
                        let key = s.urun + "|" + s.durum;
                        if(!gruplanmis[key]) {
                            gruplanmis[key] = { urun: s.urun, durum: s.durum, adet: 1, fiyat: Number(s.fiyat), ids: [s.id] };
                        } else {
                            gruplanmis[key].adet++;
                            gruplanmis[key].fiyat += Number(s.fiyat);
                            gruplanmis[key].ids.push(s.id);
                        }
                    }
                });

                liste.innerHTML = "";
                Object.values(gruplanmis).forEach(g => {
                    const isTeslim = g.durum === "Teslim Edildi";
                    liste.innerHTML += `
                        <div class="siparis-item ${isTeslim ? 'teslim-edildi' : ''}">
                            <div style="display:flex; justify-content:space-between; align-items:center;">
                                <div>
                                    <b>${g.urun}</b> ${g.adet > 1 ? `<span style="background:var(--primary); color:white; padding:2px 6px; border-radius:6px; font-size:0.7rem; margin-left:5px;">x${g.adet}</span>` : ''}
                                    <div style="font-size:0.85rem; color:#666;">${g.fiyat} TL</div>
                                </div>
                                <div style="display:flex; gap:10px; align-items:center;">
                                    <button class="btn-teslim ${isTeslim?'hazir':''}" onclick="topluIslem('${g.ids.join(',')}', 'teslim')">
                                        ${isTeslim ? 'Teslim' : 'Teslim Et'}
                                    </button>
                                    <i class="fas fa-trash" style="color:red; cursor:pointer; font-size:0.9rem;" onclick="topluIslem('${g.ids.join(',')}', 'sil')"></i>
                                </div>
                            </div>
                        </div>`;
                });
                document.getElementById('masa-toplam').innerText = toplam + " TL";
            }
        }

        function topluIslem(ids, tip) {
            const idList = ids.split(',');
            if(tip === 'teslim') {
                idList.forEach(id => db.ref('siparisler/' + id).update({durum: 'Teslim Edildi'}));
            } else if(tip === 'sil') {
                if(confirm("Seçili ürünler silinsin mi?")) {
                    idList.forEach(id => db.ref('siparisler/' + id).remove());
                }
            }
        }

        function masaSec(no) { aktifMasa = no; ekraniGuncelle(); }

        function hizliOdeme(tur) {
            const val = document.getElementById('odeme-tutar').value;
            if(!val || val <= 0) return alert("Tutar gir!");
            db.ref('siparisler').push({ urun: tur, fiyat: -Math.abs(val), masa: aktifMasa, durum: "Teslim Edildi", tip: "odeme", odemeTipi: tur });
            document.getElementById('odeme-tutar').value = "";
        }

        function masayiKapat() {
            if(!confirm("Masayı temizle?")) return;
            db.ref('siparisler').once('value', snap => {
                snap.forEach(c => { if(String(c.val().masa) === String(aktifMasa)) db.ref('siparisler/'+c.key).update({durum: "Odendi"}); });
            });
        }

        function masaTasi() {
            const yeni = document.getElementById('yeni-masa-no').value;
            db.ref('siparisler').once('value', snap => {
                snap.forEach(c => { if(String(c.val().masa) === String(aktifMasa)) db.ref('siparisler/'+c.key).update({masa:yeni}); });
                aktifMasa = yeni;
            });
        }

        function raporGoster() {
            db.ref('siparisler').once('value', snap => {
                let n=0, k=0;
                snap.forEach(c => {
                    const s = c.val();
                    if(s.durum === "Odendi") {
                        if(s.odemeTipi === "Nakit") n += Math.abs(Number(s.fiyat));
                        else if(s.odemeTipi === "Kart") k += Math.abs(Number(s.fiyat));
                        else if(!s.tip) n += Number(s.fiyat);
                    }
                });
                document.getElementById('modal-baslik').innerText = "Özet";
                document.getElementById('modal-icerik').innerHTML = `<b>Nakit:</b> ${n} TL<br><b>Kart:</b> ${k} TL<br><b>Toplam:</b> ${n+k} TL`;
                document.getElementById('gunu-kapat-btn').style.display = "block";
                document.getElementById('modal').style.display = 'block';
                document.getElementById('overlay').style.display = 'block';
            });
        }

        function gunuKapat() {
            const tarih = new Date().toLocaleDateString('tr-TR').replace(/\./g, '-');
            db.ref('siparisler').once('value', snap => {
                snap.forEach(c => {
                    if(c.val().durum === "Odendi") {
                        db.ref('arsiv/'+tarih+'/'+c.key).set({...c.val(), durum:"Arsivlendi"});
                        db.ref('siparisler/'+c.key).remove();
                    }
                });
                modalKapat(); alert("Arşivlendi.");
            });
        }

        function arsivListele() {
            db.ref('arsiv').once('value', snap => {
                let h = "";
                snap.forEach(g => { h += `<button onclick="alert('${g.key} raporu için arşivi kontrol edin.')" style="width:100%; padding:8px; margin-bottom:5px; border:1px solid #ddd; border-radius:8px; cursor:pointer;">${g.key}</button>`; });
                document.getElementById('modal-baslik').innerText = "Arşiv";
                document.getElementById('modal-icerik').innerHTML = h || "Boş.";
                document.getElementById('gunu-kapat-btn').style.display = "none";
                document.getElementById('modal').style.display = 'block';
                document.getElementById('overlay').style.display = 'block';
            });
        }

        function modalKapat() { document.getElementById('modal').style.display='none'; document.getElementById('overlay').style.display='none'; }
    </script>
</body>
</html>
